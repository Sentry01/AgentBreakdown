name: "💡 Feature request"
description: Suggest an idea or improvement for AgentBreakdown.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for the idea! Please describe what you'd like and why.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem would this solve, or what are you trying to do?
      placeholder: I'd like to see a running cost estimate in $ per model…
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should the extension do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Webview dashboard
        - CLI summary panel
        - Token / cost accounting
        - Install / packaging
        - Other
    validations:
      required: false
